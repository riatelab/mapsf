home:
  title: "mapsf: thematic cartography"
  description: >
    This package helps you design different cartographic representations such
    as proportional symbols, choropleths, or typology maps. It also provides
    several functions for displaying layout elements that enhance the graphical
    presentation of maps (e.g., scale bar, north arrow, title, labels). mapsf
    maps sf objects on base graphics.

url: https://riatelab.github.io/mapsf/

template:
  bootstrap: 5
  bslib:
    base_font: {google: "Atkinson Hyperlegible"}
    heading_font: {google: "Atkinson Hyperlegible"}
    code_font: {google: "Fira Code"}
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "mapsf: thematic cartography"

reference:
  - title: Package
    desc: Package description
    contents:
    - mapsf
  - title: "Symbology"
    desc: These functions display cartographic layers.
    contents:
    - mf_map
    - mf_raster
  - title: "Map Layout"
    desc: These functions are dedicated to the map layout design.
    contents:
    - mf_annotation
    - mf_arrow
    - mf_background
    - mf_credits
    - mf_frame
    - mf_graticule
    - mf_inset_on
    - mf_label
    - mf_layout
    - mf_legend
    - mf_scale
    - mf_shadow
    - mf_theme
    - mf_title
    - mf_worldmap
  - title: "Utility Functions"
    desc: These functions are useful for some utility tasks.
    contents:
    - mf_distr
    - mf_png
    - mf_svg
    - mf_get_borders
    - mf_get_breaks
    - mf_get_links
    - mf_get_mtq
    - mf_get_pal
    - mf_get_pencil
    - mf_get_ratio

figures:
  dev: grDevices::png
  fig.asp: 1
  fig.width: 6
  dpi: 96

footer:
  structure:
    left: developed_by
    right: package
